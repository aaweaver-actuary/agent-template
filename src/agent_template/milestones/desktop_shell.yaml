version: 1
milestones:
  - id: shell_boot
    description: App boots into a recognizable desktop shell
    target:
      kind: static_server
      url_path: /
    checks:
      - id: desktop_root
        type: selector_exists
        selector: "[data-testid='desktop-root']"
        required: true
      - id: taskbar
        type: selector_exists
        selector: "[data-testid='taskbar']"
        required: true
      - id: start_button
        type: selector_exists
        selector: "[data-testid='start-button']"
        required: true
    work_package:
      default_modify_files:
        - src/agent_template/harness/desktop_shell/index.html
      default_read_files:
        - src/agent_template/milestones/desktop_shell.yaml
        - src/agent_template/verifiers/desktop_shell.py
      non_goals:
        - no DOM snapshot persistence yet
        - no reflection taxonomy expansion yet
        - no repeated-touch touched-file comparison yet
        - no work-package generation changes beyond retaining metadata
        - no autonomous retry behavior
